name: Stockora CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  lint-and-audit:
    name: Lint & Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint Checks
        run: npm run lint

      - name: Run Audit Checks
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Secret Scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true

  build-and-archive:
    name: Compile & Package Application
    runs-on: ubuntu-latest
    env:
      # Inject dummy environment variables to satisfy Zod validation schemas
      PORT: 5000
      NODE_ENV: test
      MONGODB_URI: mongodb://127.0.0.1:27017/stockora-ci
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: ci-dummy-jwt-secret-do-not-use-in-production
      JWT_REFRESH_SECRET: ci-dummy-jwt-refresh-secret-do-not-use-in-production
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile and Build Stack
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stockora-build-package
          path: dist/
          retention-days: 7
