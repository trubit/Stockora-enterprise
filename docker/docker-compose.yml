version: '3.8'

services:
  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    ports:
      - "80:80"
    depends_on:
      - server

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      # In docker-compose, standard practice is to use service hostnames
      - MONGODB_URI=mongodb://mongodb:27017/stockora
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your_docker_production_jwt_secret_phrase
      - JWT_REFRESH_SECRET=your_docker_production_jwt_refresh_secret_phrase
    depends_on:
      - mongodb
      - redis

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
